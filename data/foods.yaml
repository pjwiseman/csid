# CSID food lists — disaccharide-free elimination phase baseline
# Source: https://www.idealnutrition.com.au/csid-how-to-manage-sucrase-isomaltase-deficiency/
# Individual tolerance varies; use reintroduction testing to personalise.

meta:
  source: "Ideal Nutrition — CSID: How To Manage Sucrase-Isomaltase Deficiency"
  source_url: "https://www.idealnutrition.com.au/csid-how-to-manage-sucrase-isomaltase-deficiency/"
  phase: "disaccharide-free elimination (Step 1)"
  note: >
    These lists reflect a strict elimination baseline. Many adults tolerate some
    sucrose, maltose, and starch after reintroduction testing (Steps 2–3).

food_groups:
  - id: fats
    name: Fats
  - id: dairy
    name: Milk and milk products
  - id: fruits
    name: Fruits
  - id: vegetables
    name: Vegetables
  - id: grains
    name: Grains
  - id: meat
    name: Meat and meat substitutes
  - id: nuts_seeds
    name: Nuts and seeds
  - id: sugars
    name: Sugars and sweeteners
  - id: other
    name: Other

