# CSID food lists — disaccharide-free elimination phase baseline
# Source: https://www.idealnutrition.com.au/csid-how-to-manage-sucrase-isomaltase-deficiency/
# Individual tolerance varies; use reintroduction testing to personalise.

meta:
  source: "Ideal Nutrition — CSID: How To Manage Sucrase-Isomaltase Deficiency"
  source_url: "https://www.idealnutrition.com.au/csid-how-to-manage-sucrase-isomaltase-deficiency/"
  phase: "disaccharide-free elimination (Step 1)"
  note: >
    These lists reflect a strict elimination baseline. Many adults tolerate some
    sucrose, maltose, and starch after reintroduction testing (Steps 2–3).
  research_sources:
    - title: Ideal Nutrition — CSID management guide (primary baseline)
      url: https://www.idealnutrition.com.au/csid-how-to-manage-sucrase-isomaltase-deficiency/
      use: Strict disaccharide-free elimination lists; reintroduction protocol
    - title: CSID Cares — Choosing Your Foods (Sucraid manufacturer)
      url: https://www.csidcares.org/treatment/diet/
      use: Tiered fruit/vegetable/dairy tolerance (most / some / few); food diary guidance; links to food composition tables
    - title: ANTHC CSID Store-Bought Food Guide (PDF)
      url: https://anthc.org/wp-content/uploads/2025/06/CSID-Store-Bought-Food-Guide.pdf
      use: Usually vs least tolerated foods; label-check tips; summer squash, cauliflower, plain yoghurt
    - title: ANTHC CSID Educational Booklet (PDF)
      url: https://anthc.org/wp-content/uploads/2025/06/CSID-Educational-Booklet.pdf
      use: Sucrose/starch overview; tolerated food tiers; individual variation
    - title: CSID Made Simple — food list
      url: https://csidmadesimple.com/csid-food-list/
      use: Vegetables/dairy tiered tolerance (most / some / few); summer squash and cauliflower
    - title: CSIDinfo.com — dairy composition table
      url: http://www.csidinfo.com/dairy.htm
      use: Sucrose, starch, and lactose grams per serving; Greek yoghurt (unsweetened)
    - title: Leeds Teaching Hospitals NHS Trust — CSID dietary advice
      url: https://www.leedsth.nhs.uk/patients/resources/dietary-advice-for-congenital-sucrose-isomaltase-deficiency/
      use: NHS clinical guidance; cauliflower/courgette substitutes; Greek yoghurt in cooking
    - title: Jenna Volpe RDN — low sucrose foods list
      url: https://wholeisticliving.com/2023/01/16/low-sucrose-foods-list/
      use: Dietitian-curated low-sucrose vegetables including zucchini and cauliflower

