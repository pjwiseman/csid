        url: https://www.leedsth.nhs.uk/patients/resources/dietary-advice-for-congenital-sucrose-isomaltase-deficiency/

  # --- Dairy (bad) ---
  - name: Flavoured yoghurt
    group: dairy
    status: bad
    concerns: [lactose, sucrose]
    notes: Added sucrose; contrast with plain unsweetened Greek yoghurt
  - name: Milk and milk products (general)
    group: dairy
    status: bad
    concerns: [lactose, sucrose]
    notes: Avoid except hard cheese, plain unsweetened Greek yoghurt, and unsweetened lactose-free or plant milks listed above

