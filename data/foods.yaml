  - name: Unsweetened lactose-free milk
    group: dairy
    status: good
  - name: Greek yoghurt (unsweetened)
    group: dairy
    status: good
    notes: Plain only; check labels for added sugar or starch thickeners. Contains lactose — test if lactose-sensitive.
    sources:
      - title: ANTHC CSID Store-Bought Food Guide
        url: https://anthc.org/wp-content/uploads/2025/06/CSID-Store-Bought-Food-Guide.pdf
      - title: CSIDinfo.com — dairy table
